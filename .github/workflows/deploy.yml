name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ] # Triggers whenever you push code to the main branch

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project Assets
        run: npm run build

      - name: Setup GitHub Pages Configuration
        uses: actions/configure-pages@v4

      - name: Upload Compiled Distribution Bundle Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite outputs all production assets into the 'dist' folder

      - name: Deploy Live Asset Bundle to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4