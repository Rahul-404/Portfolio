<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rahul Shelke</title>
  </head>
  <body class="relative bg-slate-950 text-white overflow-x-hidden">

    <div id="navbar-container"></div>

    <main class="flex-1">
      <div id="home-section"></div>
      
      <section id="project" class="relative max-w-7xl mx-auto px-6 scroll-mt-28">
        <h2 class="text-4xl font-bold text-center mb-12 bg-gradient-to-r from-purple-400 to-cyan-400 bg-clip-text text-transparent">
          Featured Projects
        </h2>

        <div class="w-full overflow-x-auto pb-2 mb-10 scrollbar-none">
          <div class="flex items-center space-x-3 min-w-max px-2">
          
            <button onclick="filterCategory(this, 'all')" data-filter="all" class="tab-btn relative p-[1.5px] rounded-xl overflow-hidden transition-all duration-300 bg-transparent text-white">
              <div class="flex items-center gap-2 px-4 py-2.5 rounded-[11px] bg-slate-900/40 hover:bg-slate-800/60 font-medium text-sm transition-colors">
                <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                <span>All Projects</span>
                <span data-count-badge="all" class="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full font-mono ml-1">6</span>
              </div>
            </button>

            <button onclick="filterCategory(this, 'ml')" data-filter="ml" class="tab-btn relative p-[1.5px] rounded-xl overflow-hidden transition-all duration-300 bg-transparent text-slate-400">
              <div class="flex items-center gap-2 px-4 py-2.5 rounded-[11px] bg-slate-900/40 hover:bg-slate-800/60 font-medium text-sm transition-colors">
                <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>
                <span>ML</span>
                <span data-count-badge="ml" class="text-xs bg-slate-800 text-slate-500 px-2 py-0.5 rounded-full font-mono ml-1">6</span>
              </div>
            </button>

            <button onclick="filterCategory(this, 'dl')" data-filter="dl" class="tab-btn relative p-[1.5px] rounded-xl overflow-hidden transition-all duration-300 bg-transparent text-slate-400">
              <div class="flex items-center gap-2 px-4 py-2.5 rounded-[11px] bg-slate-900/40 hover:bg-slate-800/60 font-medium text-sm transition-colors">
                <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="12" r="2"/><circle cx="19" cy="12" r="2"/><circle cx="12" cy="19" r="2"/><path d="M12 7v10M7 12h10M10.5 6.5l3 11M13.5 6.5l-3 11"/></svg>
                <span>DL</span>
                <span data-count-badge="dl" class="text-xs bg-slate-800 text-slate-500 px-2 py-0.5 rounded-full font-mono ml-1">4</span>
              </div>
            </button>

            <button onclick="filterCategory(this, 'nlp')" data-filter="nlp" class="tab-btn relative p-[1.5px] rounded-xl overflow-hidden transition-all duration-300 bg-transparent text-slate-400">
              <div class="flex items-center gap-2 px-4 py-2.5 rounded-[11px] bg-slate-900/40 hover:bg-slate-800/60 font-medium text-sm transition-colors">
                <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
                <span>NLP</span>
                <span data-count-badge="nlp" class="text-xs bg-slate-800 text-slate-500 px-2 py-0.5 rounded-full font-mono ml-1">4</span>
              </div>
            </button>

            <button onclick="filterCategory(this, 'genai')" data-filter="genai" class="tab-btn relative p-[1.5px] rounded-xl overflow-hidden transition-all duration-300 bg-transparent text-slate-400">
              <div class="flex items-center gap-2 px-4 py-2.5 rounded-[11px] bg-slate-900/40 hover:bg-slate-800/60 font-medium text-sm transition-colors">
                <svg class="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4M4 19h4m0-10l4-4 4 4m-4-4v12" /></svg>
                <span>GenAI</span>
                <span data-count-badge="genai" class="text-xs bg-slate-800 text-slate-500 px-2 py-0.5 rounded-full font-mono ml-1">5</span>
              </div>
            </button>

            <button onclick="filterCategory(this, 'dataeng')" data-filter="dataeng" class="tab-btn relative p-[1.5px] rounded-xl overflow-hidden transition-all duration-300 bg-transparent text-slate-400">
              <div class="flex items-center gap-2 px-4 py-2.5 rounded-[11px] bg-slate-900/40 hover:bg-slate-800/60 font-medium text-sm transition-colors">
                <svg class="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>
                <span>Data Eng</span>
                <span data-count-badge="dataeng" class="text-xs bg-slate-800 text-slate-500 px-2 py-0.5 rounded-full font-mono ml-1">3</span>
              </div>
            </button>

            <button onclick="filterCategory(this, 'mlops')" data-filter="mlops" class="tab-btn relative p-[1.5px] rounded-xl overflow-hidden transition-all duration-300 bg-transparent text-slate-400">
              <div class="flex items-center gap-2 px-4 py-2.5 rounded-[11px] bg-slate-900/40 hover:bg-slate-800/60 font-medium text-sm transition-colors">
                <svg class="w-4 h-4 text-rose-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829a9 9 0 000-12.728m0 0l-2.829 2.828M5.636 5.636a9 9 0 000 12.728m0 0l2.829-2.829m-2.829 2.829a9 9 0 010-12.728m0 0l2.829 2.828" /></svg>
                <span>MLOps</span>
                <span data-count-badge="mlops" class="text-xs bg-slate-800 text-slate-500 px-2 py-0.5 rounded-full font-mono ml-1">3</span>
              </div>
            </button>

            <button onclick="filterCategory(this, 'analytics')" data-filter="analytics" class="tab-btn relative p-[1.5px] rounded-xl overflow-hidden transition-all duration-300 bg-transparent text-slate-400">
              <div class="flex items-center gap-2 px-4 py-2.5 rounded-[11px] bg-slate-900/40 hover:bg-slate-800/60 font-medium text-sm transition-colors">
                <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z" /></svg>
                <span>Analytics</span>
                <span data-count-badge="analytics" class="text-xs bg-slate-800 text-slate-500 px-2 py-0.5 rounded-full font-mono ml-1">4</span>
              </div>
            </button>

          </div>
        </div>

        <div id="projects-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
      </section>

      <div id="about-section"></div>
      <div id="contact-section"></div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
